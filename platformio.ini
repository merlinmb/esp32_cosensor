; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
globallib_dir = ./include/lib

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
upload_port = COM4
monitor_port = COM4
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
monitor_filters = 
	esp32_exception_decoder
    colorize

build_flags =
	-DCORE_DEBUG_LEVEL=0
	-Os
    -I../libraries/merlinIncludes
    -IC:/Users/merli/.platformio/packages/framework-arduinoespressif32/libraries/WiFi/src
    -IC:/Users/merli/.platformio/packages/framework-arduinoespressif32/libraries/Network/src
    -IC:/Users/merli/.platformio/packages/framework-arduinoespressif32/libraries/ESPmDNS/src

lib_ldf_mode = deep+

lib_extra_dirs = 
    ../libraries/merlinIncludes
lib_deps =
	Arduino
    ESPmDNS
    WiFi
    Network
    https://github.com/taranais/NTPClient
    WiFiClientSecure
    WebServer
    ArduinoOTA
	knolleary/PubSubClient@^2.8
    PaulStoffregen/Time
    https://github.com/Sensirion/arduino-i2c-scd4x
    olikraus/u8g2